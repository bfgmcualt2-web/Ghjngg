<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackjack Royale</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="container">
        <header class="header">
            <a class="back-link" href="home.html">← Lobby</a>
            <p class="eyebrow">Blackjack Royale</p>
            <h1>🃏 Beat the Dealer</h1>
            <div class="balance" aria-live="polite">Bankroll: $<span id="balance">1000</span></div>
        </header>

        <section class="table-shell" aria-label="Blackjack table">
            <div class="game-area">
                <section class="dealer-section hand-panel">
                    <div class="hand-heading">
                        <h2>Dealer</h2>
                        <span class="hand-value">Value: <strong id="dealerValue">0</strong></span>
                    </div>
                    <div id="dealerCards" class="cards" aria-label="Dealer cards"></div>
                </section>

                <section class="player-section hand-panel">
                    <div class="hand-heading">
                        <h2>You</h2>
                        <span class="hand-value">Value: <strong id="playerValue">0</strong></span>
                    </div>
                    <div id="playerCards" class="cards" aria-label="Player cards"></div>
                </section>
            </div>

            <div id="resultMessage" class="result-message" aria-live="polite"></div>

            <section id="bettingSection" class="betting-section">
                <h3>Place your bet</h3>
                <div class="bet-input">
                    <label class="sr-only" for="betAmount">Bet amount</label>
                    <input id="betAmount" type="number" min="10" step="10" value="50">
                    <button type="button" onclick="placeBet()">Deal Cards</button>
                </div>
                <div class="quick-bets" aria-label="Quick bets">
                    <button type="button" onclick="quickBet(25)">$25</button>
                    <button type="button" onclick="quickBet(50)">$50</button>
                    <button type="button" onclick="quickBet(100)">$100</button>
                    <button type="button" onclick="quickBet(250)">$250</button>
                </div>
            </section>

            <section id="gameControls" class="controls" style="display: none;">
                <button type="button" class="btn-hit" onclick="hit()">Hit</button>
                <button type="button" class="btn-stand" onclick="stand()">Stand</button>
                <button type="button" class="btn-reset" onclick="resetGame()">New Round</button>
            </section>
        </section>

        <aside class="history">
            <h3>Recent hands</h3>
            <div id="history" class="history-list" aria-live="polite"></div>
        </aside>
    </main>
    <script src="script.js"></script>
</body>
</html>
