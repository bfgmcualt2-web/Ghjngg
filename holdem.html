<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Texas Hold'em Poker</title>
    <link rel="stylesheet" href="game-styles.css">
    <link rel="stylesheet" href="holdem-styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="home.html" class="back-btn">← Back to Home</a>
            <h1>♠️ Texas Hold'em</h1>
            <div class="balance">
                <span>Balance: $<span id="balance">1000</span></span>
            </div>
        </div>
        <div class="poker-table">
            <div class="community-section">
                <h3>Community Cards</h3>
                <div class="cards" id="communityCards"></div>
            </div>
            <div class="opponents-section">
                <div class="opponent">
                    <div class="opponent-name">Opponent 1</div>
                    <div class="opponent-stack">$<span class="opponent1-stack">1000</span></div>
                    <div class="opponent-cards"><span>🃏</span><span>🃏</span></div>
                </div>
                <div class="opponent">
                    <div class="opponent-name">Opponent 2</div>
                    <div class="opponent-stack">$<span class="opponent2-stack">1000</span></div>
                    <div class="opponent-cards"><span>🃏</span><span>🃏</span></div>
                </div>
            </div>
            <div class="player-section">
                <h3>Your Hand</h3>
                <div class="cards" id="playerCards"></div>
                <div class="hand-rank" id="handRank"></div>
            </div>
        </div>
        <div class="pot-section">
            <div class="pot">Pot: $<span id="pot">0</span></div>
        </div>
        <div class="betting-section" id="bettingSection">
            <h3>Place Your Blind</h3>
            <div class="bet-input">
                <input type="number" id="betAmount" min="10" max="500" value="50" step="10">
                <button onclick="startPokerHand()">Start Hand</button>
            </div>
            <div class="quick-bets">
                <button onclick="quickBet(50)">$50</button>
                <button onclick="quickBet(100)">$100</button>
                <button onclick="quickBet(250)">$250</button>
                <button onclick="allIn()" class="btn-all-in">All In</button>
            </div>
        </div>
        <div class="controls" id="gameControls" style="display: none;">
            <div class="action-buttons">
                <button onclick="fold()" class="btn-fold">Fold</button>
                <button onclick="check()" class="btn-check">Check</button>
                <button onclick="call()" class="btn-call">Call</button>
                <button onclick="raise()" class="btn-raise">Raise</button>
                <button onclick="allInPoker()" class="btn-all-in">All In</button>
            </div>
        </div>
        <div class="game-status" id="gameStatus"></div>
        <div class="result-message" id="resultMessage"></div>
        <div class="controls" id="playAgainControls" style="display: none;">
            <button onclick="playAgain()" class="btn-reset">Play Again</button>
        </div>
    </div>
    <script src="holdem.js"></script>
</body>
</html>
