<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Texas Hold'em Poker</title>
    <link rel="stylesheet" href="holdem-styles.css">
</head>
<body>
    <main class="container">
        <header class="header">
            <a href="home.html" class="back-btn">← Lobby</a>
            <p class="eyebrow">No-limit table</p>
            <h1>♠️ Texas Hold'em</h1>
            <div class="balance">Bankroll: $<span id="balance">1000</span></div>
        </header>

        <section class="poker-table" aria-label="Texas Hold'em table">
            <div class="table-felt">
                <div class="opponents-section" aria-label="Opponents">
                    <article class="opponent">
                        <div class="avatar">🤠</div>
                        <div>
                            <div class="opponent-name">Opponent 1</div>
                            <div class="opponent-stack">Stack $<span class="opponent1-stack">1000</span></div>
                        </div>
                        <div class="opponent-cards" aria-label="Hidden opponent cards"><span></span><span></span></div>
                    </article>
                    <article class="opponent">
                        <div class="avatar">😎</div>
                        <div>
                            <div class="opponent-name">Opponent 2</div>
                            <div class="opponent-stack">Stack $<span class="opponent2-stack">1000</span></div>
                        </div>
                        <div class="opponent-cards" aria-label="Hidden opponent cards"><span></span><span></span></div>
                    </article>
                </div>

                <section class="community-section">
                    <p class="section-label">The Board</p>
                    <h2>Community Cards</h2>
                    <div class="cards community-cards" id="communityCards" aria-label="Community cards"></div>
                    <div class="pot-section">
                        <span>Current Pot</span>
                        <strong>$<span id="pot">0</span></strong>
                    </div>
                </section>

                <section class="player-section">
                    <div class="player-heading">
                        <div>
                            <p class="section-label">Your seat</p>
                            <h2>Your Hand</h2>
                        </div>
                        <div class="hand-rank" id="handRank">Waiting for cards</div>
                    </div>
                    <div class="cards" id="playerCards" aria-label="Your cards"></div>
                </section>
            </div>
        </section>

        <section class="action-panel">
            <div class="game-status" id="gameStatus" aria-live="polite">Set your blind to start a new hand.</div>
            <div class="result-message" id="resultMessage" aria-live="polite"></div>

            <div class="betting-section" id="bettingSection">
                <h3>Post your blind</h3>
                <div class="bet-input">
                    <label class="sr-only" for="betAmount">Blind amount</label>
                    <input type="number" id="betAmount" min="10" max="500" value="50" step="10">
                    <button type="button" onclick="startPokerHand()">Start Hand</button>
                </div>
                <div class="quick-bets">
                    <button type="button" onclick="quickBet(50)">$50</button>
                    <button type="button" onclick="quickBet(100)">$100</button>
                    <button type="button" onclick="quickBet(250)">$250</button>
                    <button type="button" onclick="allIn()" class="btn-all-in">All In</button>
                </div>
            </div>

            <div class="controls" id="gameControls" style="display: none;">
                <div class="action-buttons">
                    <button type="button" onclick="fold()" class="btn-fold">Fold</button>
                    <button type="button" onclick="check()" class="btn-check">Check</button>
                    <button type="button" onclick="call()" class="btn-call">Call</button>
                    <button type="button" onclick="raise()" class="btn-raise">Raise</button>
                    <button type="button" onclick="allInPoker()" class="btn-all-in">All In</button>
                </div>
            </div>

            <div class="controls" id="playAgainControls" style="display: none;">
                <button type="button" onclick="playAgain()" class="btn-reset">Play Again</button>
            </div>
        </section>

        <aside class="history">
            <h3>Session history</h3>
            <div id="history" class="history-list" aria-live="polite"></div>
        </aside>
    </main>
    <script src="holdem.js"></script>
</body>
</html>
