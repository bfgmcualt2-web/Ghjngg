<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackjack Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🃏 Blackjack</h1>
            <div class="balance">
                <span>Balance: $<span id="balance">1000</span></span>
            </div>
        </div>

        <div class="game-area">
            <!-- Dealer Section -->
            <div class="dealer-section">
                <h2>Dealer</h2>
                <div class="cards dealer-cards" id="dealerCards"></div>
                <div class="hand-value">
                    Value: <span id="dealerValue">0</span>
                </div>
            </div>

            <!-- Player Section -->
            <div class="player-section">
                <h2>You</h2>
                <div class="cards player-cards" id="playerCards"></div>
                <div class="hand-value">
                    Value: <span id="playerValue">0</span>
                </div>
            </div>
        </div>

        <!-- Betting Section -->
        <div class="betting-section" id="bettingSection">
            <h3>Place Your Bet</h3>
            <div class="bet-input">
                <input type="number" id="betAmount" min="10" max="1000" value="50" step="10">
                <button onclick="placeBet()">Deal</button>
            </div>
            <div class="quick-bets">
                <button onclick="quickBet(50)">$50</button>
                <button onclick="quickBet(100)">$100</button>
                <button onclick="quickBet(500)">$500</button>
            </div>
        </div>

        <!-- Game Controls -->
        <div class="controls" id="gameControls" style="display: none;">
            <button onclick="hit()" class="btn-hit">Hit</button>
            <button onclick="stand()" class="btn-stand">Stand</button>
            <button onclick="resetGame()" class="btn-reset">New Game</button>
        </div>

        <!-- Result Message -->
        <div class="result-message" id="resultMessage"></div>

        <!-- History -->
        <div class="history">
            <h3>Recent Results</h3>
            <div id="history" class="history-list"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
